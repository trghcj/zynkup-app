name: zynkup
description: "Zynkup — Campus Event App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 🔔 Notifications
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^20.1.0

  # 🌐 API
  http: ^1.2.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # 🎨 UI & Utilities
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  qr_flutter: ^4.1.0
  google_fonts: ^6.0.0
  flutter_staggered_animations: ^1.1.1
  cached_network_image: ^3.3.0
  image_picker: ^1.0.0
  url_launcher: ^6.3.0

  # 📊 Charts
  fl_chart: ^0.66.0
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/google_logo.png